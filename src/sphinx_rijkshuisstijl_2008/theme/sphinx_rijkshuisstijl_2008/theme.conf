[theme]
name = sphinx_rijkshuisstijl_2008
inherit = alabaster
stylesheet = css/theme.css

[theme.pygments_style]
default = default

[options]
show_relbar_bottom = true
show_related = false
logo = /_static/img/ro-logo.svg
logo_text = Rijkshuisstijl 2008 Sphinx Theme
slogan = Rijkshuisstijl 2008 Sphinx Theme
meta_footer = A theme for Sphinx documentation, based on the Rijkshuisstijl 2008 design.
show_copyright_privacy_block_footer = false
copyright_url =
privacy_url =
home_url = /
